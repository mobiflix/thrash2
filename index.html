<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Video Player</title>
    <style>
        .video-container {
            max-width: 800px;
            margin: 20px auto;
            text-align: center;
        }
        video {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="video-container">
    <h2>Aking Video Player</h2>
    
    <video controls poster="placeholder-image.jpg">
        <source src="https://www.mediafire.com/file_premium/uw6yquf1j89uawp/Thrash.2026.1080p.NF.WEB-DL.AAC5.1.x265-Kotoko.mkv/file" type="video/mp4">
        <source src="https://www.mediafire.com/file_premium/uw6yquf1j89uawp/Thrash.2026.1080p.NF.WEB-DL.AAC5.1.x265-Kotoko.mkv/file" type="video/mp4">
        <source src="https://www.mediafire.com/file_premium/uw6yquf1j89uawp/Thrash.2026.1080p.NF.WEB-DL.AAC5.1.x265-Kotoko.mkv/file" type="video/ogg">
        
        Paumanhin, ang iyong browser ay hindi suportado ang HTML5 video.
    </video>
    
    <p>Gumagana ito sa MP4, WebM, at Ogg formats.</p>
</div>

</body>
</html>
